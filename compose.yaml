# DO NOT USE IN PRODUCTION, THIS CONFIGURATION IS INTENTIONALLY INSECURE

# This compose file runs the database for development.
# Copy .env.example and fill out your Gamma Client credentials to get started.

name: dont-spill-the-tea

services:
  db:
    image: postgres:18
    container_name: dont-spill-the-tea-dev-db
    restart: unless-stopped
    user: postgres
    environment:
      - POSTGRES_DB=dont-spill-the-tea
      - POSTGRES_PASSWORD=secret-dev-password

    ports:
      - "5432:5432"

    healthcheck:
      test: ["CMD", "pg_isready"]
      interval: 10s
      timeout: 5s
      retries: 5
  green-bite:
    image: arienshibani/green-bite:latest
    platform: linux/amd64
    restart: unless-stopped

    ports:
      - "80:80"
